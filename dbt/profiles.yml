ga4_analytics:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account-json
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: ga4_analytics
      keyfile_json: "{{ env_var('GCP_SA_KEY_JSON') | fromjson }}"
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1
