ga4_analytics:
  target: prod
  outputs:
    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: ga4_analytics
      keyfile: "{{ env_var('GCP_KEYFILE_PATH', '/tmp/gcp_key.json') }}"
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1
